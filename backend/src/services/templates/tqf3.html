<html>
<head>
<meta charset="utf-8"/>
<style>
  body {
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    line-height: 1.8;
  }

  .section {
    margin-bottom: 20px;
    page-break-inside: avoid;
  }

  .page-break {
    page-break-before: always;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th, td {
    border: 1px solid #000;
    padding: 4px;
  }

  tr {
    page-break-inside: avoid;
  }

  h1, h2 {
    margin: 8px 0;
  }
</style>
</head>

<body>
  <div class="document">
    {{content}}
  </div>
</body>
</html>
